name: Weekly Link Check

# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:       # Manual trigger from the Actions tab

# ─── Permissions ─────────────────────────────────────────────────────────────
permissions:
  contents: write          # Push a new branch
  pull-requests: write     # Open the PR

jobs:
  check-links:
    name: Detect and remove broken links
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout develop (always work on the latest integration base) ──
      - name: Checkout develop branch
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0   # full history so git push works correctly

      # ── 2. Node.js 22 (built-in fetch, no extra deps needed) ─────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # ── 3. Run the link checker ────────────────────────────────────────────
      - name: Check all links
        id: checker
        run: |
          node .github/scripts/check-broken-links.mjs > /tmp/report.json
          COUNT=$(node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync('/tmp/report.json','utf8')).broken.length))")
          echo "broken_count=${COUNT}" >> "$GITHUB_OUTPUT"
          if [[ "$COUNT" -gt 0 ]]; then
            echo "Found ${COUNT} broken link(s)."
          else
            echo "All links are healthy."
          fi

      # ── 4. Commit + PR (only when broken links were found) ────────────────
      - name: Create PR with cleaned resources.json
        if: steps.checker.outputs.broken_count > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BROKEN_COUNT: ${{ steps.checker.outputs.broken_count }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="fix/remove-broken-links-${DATE}"

          # Avoid collision if the workflow runs more than once on the same day
          if git ls-remote --exit-code origin "refs/heads/${BRANCH}" &>/dev/null; then
            BRANCH="${BRANCH}-$(date +%H%M)"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add src/data/resources.json
          git commit -m "fix(data): remove ${BROKEN_COUNT} broken link(s) [${DATE}]"
          git push origin "$BRANCH"

          # ── Generate PR body ──────────────────────────────────────────────
          # Save the run date so the Node.js heredoc can read it without
          # relying on shell-variable expansion inside single-quoted JSEOF.
          echo "$DATE" > /tmp/run-date.txt

          node - <<'JSEOF'
const fs = require('fs');
const { broken } = JSON.parse(fs.readFileSync('/tmp/report.json', 'utf8'));
const date       = fs.readFileSync('/tmp/run-date.txt', 'utf8').trim();

const rows = broken
  .map(b => {
    const reason = b.status ? `HTTP ${b.status}` : (b.error || 'Connection error');
    return `| ${b.title} | \`${b.url}\` | ${reason} |`;
  })
  .join('\n');

const body = [
  '## Broken Links Removed',
  '',
  'This PR was automatically generated by the **Weekly Link Checker** workflow.',
  '',
  '### Summary',
  `- **Removed:** ${broken.length} resource(s)`,
  `- **Run date:** ${date}`,
  `- **Trigger:** Scheduled (Monday) / Manual`,
  '',
  '### Removed Resources',
  '',
  '| Title | URL | Reason |',
  '|-------|-----|--------|',
  rows,
  '',
  '---',
  '_Automated by the [Weekly Link Check](.github/workflows/weekly-link-check.yml) workflow._',
  '_Review the list above and merge when ready._',
].join('\n');

fs.writeFileSync('/tmp/pr-body.md', body);
JSEOF

          gh pr create \
            --base develop \
            --head "$BRANCH" \
            --title "fix(data): remove ${BROKEN_COUNT} broken link(s) ($DATE)" \
            --body-file /tmp/pr-body.md

      # ── 5. Summary when nothing was broken ────────────────────────────────
      - name: All links healthy
        if: steps.checker.outputs.broken_count == 0
        run: echo "No broken links found. Nothing to do."
